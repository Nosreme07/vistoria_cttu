name: vistoria_cttu
description: "Aplicativo de vistoria de semáforos CTTU."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mask_text_input_formatter: ^2.9.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.2
  share_plus: ^10.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  intl: ^0.19.0
  image_picker: ^1.1.2 
  image: ^4.1.3
  firebase_storage: ^13.0.6
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # ==== ADICIONADO AQUI ====
  flutter_launcher_icons: ^0.13.1 

# ==========================================
# CONFIGURAÇÃO DO ÍCONE DO APLICATIVO
# ==========================================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/login.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/acervo.json
    - assets/images/